openapi: 3.1.0
info:
  title: iris-server Bootstrap API
  version: 0.1.0
  description: |
    Bootstrap API contract for iris-server benchmark, health, and player session endpoints.
servers:
  - url: http://localhost:8080
paths:
  /metrics:
    get:
      operationId: getPrometheusMetrics
      summary: Export service and orchestration metrics in Prometheus format
      responses:
        '200':
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string
  /healthz:
    get:
      operationId: healthz
      summary: Service health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /bench/matmul:
    post:
      operationId: runMatmulBenchmark
      summary: Run a deterministic matrix multiplication benchmark
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatmulRequest'
      responses:
        '200':
          description: Benchmark results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatmulResponse'
        '400':
          description: Invalid benchmark request
  /bench/runs/{run_id}:
    get:
      operationId: getBenchmarkRun
      summary: Fetch benchmark run metadata
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Benchmark run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenchmarkRun'
        '404':
          description: Run not found
  /player/sessions:
    post:
      operationId: createPlayerSession
      summary: Bootstrap a player session and start transport orchestration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerSessionRequest'
      responses:
        '200':
          description: Session bootstrap metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerSessionResponse'
  /player/sessions/{session_id}:
    get:
      operationId: getPlayerSession
      summary: Fetch player session metadata and status
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: X-Session-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Player session metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerSessionStatus'
        '401':
          description: Missing or invalid session token
        '404':
          description: Session not found
  /player/sessions/{session_id}/metrics:
    get:
      operationId: getPlayerSessionMetrics
      summary: Read normalized metrics for a player session
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: X-Session-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session metrics payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerSessionMetrics'
        '401':
          description: Missing or invalid session token
        '404':
          description: Session not found
  /player/sessions/{session_id}/revoke:
    post:
      operationId: revokePlayerSession
      summary: Revoke a player session token
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: X-Session-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokePlayerSessionRequest'
      responses:
        '200':
          description: Session token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokePlayerSessionResponse'
        '401':
          description: Missing, invalid, expired, or revoked session token
        '404':
          description: Session not found
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - git_sha
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
        git_sha:
          type: string
    MatmulRequest:
      type: object
      required:
        - n
        - dtype
        - runs
        - warmup_runs
        - seed
      properties:
        n:
          type: integer
          minimum: 2
          maximum: 2048
        dtype:
          type: string
          enum: [f32, f64]
        runs:
          type: integer
          minimum: 1
          maximum: 200
        warmup_runs:
          type: integer
          minimum: 0
          maximum: 50
        seed:
          type: integer
          minimum: 0
    MatmulResponse:
      type: object
      required:
        - run_id
        - backend
        - p50_ms
        - p95_ms
        - throughput_ops_s
      properties:
        run_id:
          type: string
        backend:
          type: string
        p50_ms:
          type: number
        p95_ms:
          type: number
        throughput_ops_s:
          type: number
        artifact_path:
          type: string
    BenchmarkRun:
      type: object
      required:
        - run_id
        - backend
        - config
        - metrics
        - created_at_utc
        - git_sha
      properties:
        run_id:
          type: string
        backend:
          type: string
        config:
          type: object
          additionalProperties: true
        metrics:
          type: object
          additionalProperties: true
        created_at_utc:
          type: string
        git_sha:
          type: string
        artifact_path:
          type: string
    PlayerSessionRequest:
      type: object
      properties:
        profile:
          type: string
          enum: [real-time, buffered]
          default: real-time
        relay_addr:
          type: string
          default: 127.0.0.1:7443
        stream_id:
          type: integer
          minimum: 1
          maximum: 4294967295
          default: 777
        frames:
          type: integer
          minimum: 1
          maximum: 100000
          default: 120
        fps:
          type: integer
          minimum: 1
          maximum: 240
          default: 30
        payload_size:
          type: integer
          minimum: 1
          maximum: 4194304
          default: 1024
        timeout_ms:
          type: integer
          minimum: 500
          maximum: 120000
          default: 20000
    PlayerSessionResponse:
      type: object
      required:
        - session_id
        - session_token
        - relay_url
        - stream_id
        - profile
        - metrics_url
        - websocket_url
        - correlation_id
        - created_at_utc
        - expires_at_utc
      properties:
        session_id:
          type: string
        session_token:
          type: string
        relay_url:
          type: string
        stream_id:
          type: integer
        profile:
          type: string
          enum: [real-time, buffered]
        metrics_url:
          type: string
        websocket_url:
          type: string
        correlation_id:
          type: string
        created_at_utc:
          type: string
        expires_at_utc:
          type: string
        revoked_at_utc:
          type: string
          nullable: true
    PlayerSessionStatus:
      allOf:
        - $ref: '#/components/schemas/PlayerSessionResponse'
        - type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [starting, running, completed, failed, stopped]
            error:
              type: string
    PlayerSessionMetrics:
      type: object
      required:
        - session_id
        - correlation_id
        - profile
        - status
      properties:
        session_id:
          type: string
        correlation_id:
          type: string
        profile:
          type: string
          enum: [real-time, buffered]
        frames_sent:
          type: integer
          nullable: true
        frames_received:
          type: integer
          nullable: true
        frames_dropped:
          type: integer
          nullable: true
        avg_latency_ms:
          type: number
          nullable: true
        artifact_path:
          type: string
          nullable: true
        status:
          type: string
          enum: [starting, running, completed, failed, stopped]
        error:
          type: string
          nullable: true
        metrics_url:
          type: string
        expires_at_utc:
          type: string
        revoked_at_utc:
          type: string
          nullable: true
    RevokePlayerSessionRequest:
      type: object
      properties:
        reason:
          type: string
          default: manual
    RevokePlayerSessionResponse:
      type: object
      required:
        - session_id
        - revoked_at_utc
        - status
      properties:
        session_id:
          type: string
        revoked_at_utc:
          type: string
        status:
          type: string
          enum: [revoked]
