openapi: 3.1.0
info:
  title: iris-server Benchmark API
  version: 0.1.0
  description: |
    Bootstrap API contract for iris-server benchmark and health endpoints.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: healthz
      summary: Service health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /bench/matmul:
    post:
      operationId: runMatmulBenchmark
      summary: Run a deterministic matrix multiplication benchmark
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatmulRequest'
      responses:
        '200':
          description: Benchmark results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatmulResponse'
        '400':
          description: Invalid benchmark request
  /bench/runs/{run_id}:
    get:
      operationId: getBenchmarkRun
      summary: Fetch benchmark run metadata
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Benchmark run metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenchmarkRun'
        '404':
          description: Run not found
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - git_sha
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
        git_sha:
          type: string
    MatmulRequest:
      type: object
      required:
        - n
        - dtype
        - runs
        - warmup_runs
        - seed
      properties:
        n:
          type: integer
          minimum: 2
          maximum: 2048
        dtype:
          type: string
          enum: [f32, f64]
        runs:
          type: integer
          minimum: 1
          maximum: 200
        warmup_runs:
          type: integer
          minimum: 0
          maximum: 50
        seed:
          type: integer
          minimum: 0
    MatmulResponse:
      type: object
      required:
        - run_id
        - backend
        - p50_ms
        - p95_ms
        - throughput_ops_s
      properties:
        run_id:
          type: string
        backend:
          type: string
        p50_ms:
          type: number
        p95_ms:
          type: number
        throughput_ops_s:
          type: number
        artifact_path:
          type: string
    BenchmarkRun:
      type: object
      required:
        - run_id
        - backend
        - config
        - metrics
        - created_at_utc
        - git_sha
      properties:
        run_id:
          type: string
        backend:
          type: string
        config:
          type: object
          additionalProperties: true
        metrics:
          type: object
          additionalProperties: true
        created_at_utc:
          type: string
        git_sha:
          type: string
        artifact_path:
          type: string
