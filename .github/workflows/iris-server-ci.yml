name: iris-server-ci

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'services/iris-server/**'
      - '.github/workflows/iris-server-ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'services/iris-server/**'
      - '.github/workflows/iris-server-ci.yml'

jobs:
  iris-server-contract-and-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install schema validation dependencies
        run: python -m pip install --upgrade pip openapi-spec-validator pyyaml

      - name: Validate OpenAPI schema
        run: |
          python services/iris-server/spec/validate_openapi.py \
            services/iris-server/spec/openapi.yaml

      - name: Benchmark smoke
        run: bash services/iris-server/bench/smoke.sh
