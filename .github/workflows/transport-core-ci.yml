name: transport-core-ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            transport_core:
              - 'services/transport-core/**'
              - '.github/workflows/transport-core-ci.yml'
      - name: policy-pass
        if: steps.changes.outputs.transport_core != 'true'
        run: echo "No transport-core changes; required check satisfied."
      - uses: dtolnay/rust-toolchain@stable
        if: steps.changes.outputs.transport_core == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.transport_core == 'true'
        with:
          workspaces: |
            services/transport-core -> services/transport-core/target
      - name: fmt
        if: steps.changes.outputs.transport_core == 'true'
        working-directory: services/transport-core
        run: cargo fmt --all -- --check
      - name: clippy
        if: steps.changes.outputs.transport_core == 'true'
        working-directory: services/transport-core
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        if: steps.changes.outputs.transport_core == 'true'
        working-directory: services/transport-core
        run: cargo test --all-targets
      - name: smoke
        if: steps.changes.outputs.transport_core == 'true'
        working-directory: services/transport-core
        run: bash scripts/smoke.sh

  benchmark-evidence:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            transport_core:
              - 'services/transport-core/**'
              - '.github/workflows/transport-core-ci.yml'
      - name: policy-pass
        if: steps.changes.outputs.transport_core != 'true'
        run: echo "No transport-core changes; skipping benchmark evidence."
      - uses: dtolnay/rust-toolchain@stable
        if: steps.changes.outputs.transport_core == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.transport_core == 'true'
        with:
          workspaces: |
            services/transport-core -> services/transport-core/target
      - name: benchmark-evidence
        id: bench
        if: steps.changes.outputs.transport_core == 'true'
        working-directory: services/transport-core
        env:
          IRIS_BENCH_FAST: "1"
        run: bash scripts/benchmark.sh
      - name: benchmark-artifact-debug
        if: always() && steps.changes.outputs.transport_core == 'true'
        run: |
          echo "benchmark output dir: ${{ steps.bench.outputs.out_dir }}"
      - name: upload-benchmark-artifacts
        if: always() && steps.changes.outputs.transport_core == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: transport-core-benchmark-${{ github.sha }}
          path: ${{ steps.bench.outputs.out_dir != '' && steps.bench.outputs.out_dir || 'services/transport-core/docs/evidence' }}
          if-no-files-found: warn
