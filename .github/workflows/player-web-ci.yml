name: player-web-ci

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/player-web/**'
      - 'tests/e2e/**'
      - 'tests/helpers/**'
      - 'services/iris-server/app/**'
      - 'docs/runbooks/player-web-demo.md'
      - '.github/workflows/player-web-ci.yml'
  push:
    branches:
      - '**'
    paths:
      - 'apps/player-web/**'
      - 'tests/e2e/**'
      - 'tests/helpers/**'
      - 'services/iris-server/app/**'
      - 'docs/runbooks/player-web-demo.md'
      - '.github/workflows/player-web-ci.yml'

jobs:
  typecheck-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: apps/player-web
        run: npm ci

      - name: TypeScript type check
        working-directory: apps/player-web
        run: npm run typecheck

      - name: Vite build
        working-directory: apps/player-web
        run: npm run build

      - name: Install Playwright browsers
        working-directory: apps/player-web
        run: npx playwright install --with-deps chromium

      - name: Browser acceptance tests (5 scenarios)
        working-directory: apps/player-web
        run: npm run test:browser

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/iris-server/requirements.txt

      - name: Player e2e smoke
        run: pytest -q tests/e2e/test_player_flow.py
