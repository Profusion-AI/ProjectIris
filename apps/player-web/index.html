<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris Player Web MVP</title>
    <style>
      :root {
        --bg: #f3efe6;
        --ink: #11131a;
        --panel: #fffdf9;
        --accent: #d9662b;
        --accent-soft: #ffe0cf;
        --muted: #5f6572;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 10%, #fdd8b2 0, transparent 30%),
          radial-gradient(circle at 85% 90%, #bfd8ff 0, transparent 35%),
          var(--bg);
      }

      /* ── App shell ────────────────────────────────────────────────────── */

      .app-shell {
        max-width: 980px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
        display: grid;
        gap: 1rem;
      }

      .hero {
        background: linear-gradient(120deg, var(--accent-soft), #fff9f3);
        border: 1px solid #f0cdb7;
        border-radius: 14px;
        padding: 1.25rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2.8vw, 2.2rem);
      }

      .card {
        background: var(--panel);
        border: 1px solid #e7dfd5;
        border-radius: 12px;
        padding: 1rem;
      }

      /* ── Status banner ────────────────────────────────────────────────── */

      .status-banner {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--panel);
        border: 1px solid #e7dfd5;
        border-radius: 10px;
        padding: 0.6rem 1rem;
        font-size: 0.95rem;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        transition: background 0.3s;
      }

      .status-label {
        font-weight: 600;
      }

      .status-session-id {
        color: var(--muted);
        font-size: 0.8rem;
        margin-left: auto;
        font-variant-numeric: tabular-nums;
      }

      /* ── Metrics strip ────────────────────────────────────────────────── */

      .metrics-strip {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .metric-pill {
        background: var(--panel);
        border: 1px solid #e7dfd5;
        border-radius: 20px;
        padding: 0.25rem 0.75rem;
        font-size: 0.82rem;
        font-variant-numeric: tabular-nums;
      }

      .mode-pill {
        background: var(--accent-soft);
        border-color: #f0cdb7;
      }

      .latency-pill {
        background: #eaf6ee;
        border-color: #b5ddc2;
      }

      /* ── Action bar ───────────────────────────────────────────────────── */

      .action-bar form {
        display: flex;
        gap: 0.5rem;
        align-items: end;
        background: var(--panel);
        border: 1px solid #e7dfd5;
        border-radius: 10px;
        padding: 0.75rem 1rem;
      }

      label {
        display: grid;
        gap: 0.3rem;
        font-size: 0.9rem;
      }

      select,
      button {
        border-radius: 8px;
        border: 1px solid #c9b7a8;
        font: inherit;
        padding: 0.55rem 0.75rem;
      }

      button[type="submit"] {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      button[type="submit"]:hover:not(:disabled) {
        filter: brightness(1.06);
      }

      button[type="submit"]:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      button[type="button"] {
        background: var(--panel);
        cursor: pointer;
      }

      button[type="button"]:hover {
        filter: brightness(0.96);
      }

      /* ── Error panel ──────────────────────────────────────────────────── */

      .error-panel {
        background: #fff5f5;
        border: 1px solid #f5c6c6;
        border-radius: 10px;
        padding: 1rem;
        display: grid;
        gap: 0.5rem;
      }

      .error-panel[data-state="degraded"] {
        background: #fff8f0;
        border-color: #f5d9a6;
      }

      .error-title {
        font-size: 1rem;
      }

      .error-message {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .retry-btn {
        justify-self: start;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        font: inherit;
        cursor: pointer;
      }

      .retry-btn:hover {
        filter: brightness(1.06);
      }

      /* ── Render surface ───────────────────────────────────────────────── */

      .render-section {
        /* extends .card */
      }

      canvas {
        width: 100%;
        height: auto;
        border-radius: 10px;
        border: 1px solid #ddd0c2;
        background: #141b2d;
      }
    </style>
  </head>
  <body>
    <div id="player-root"></div>
    <script type="module" src="./src/client.ts"></script>
  </body>
</html>
